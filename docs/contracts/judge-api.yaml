openapi: 3.1.0
info:
  title: Judge Service API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: health
      responses:
        "200": { description: 서비스 정상 }
  /judge:
    post:
      operationId: createJudgeJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JudgeRequest"
      responses:
        "200":
          description: 동기식 MVP 채점 결과
components:
  schemas:
    JudgeRequest:
      type: object
      required: [submission_id, language, source_code, test_cases]
      properties:
        submission_id: { type: string }
        language:
          type: string
          enum: [python, javascript, cpp, java]
        source_code: { type: string }
        test_cases:
          type: array
          items:
            type: object
            required: [id, stdin, expected_stdout]
            properties:
              id: { type: string }
              stdin: { type: string }
              expected_stdout: { type: string }
        limits:
          type: object
          properties:
            time_ms: { type: integer, default: 2000 }
            memory_mb: { type: integer, default: 128 }
