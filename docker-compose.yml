services:
  platform-api:
    build:
      context: ./apps/platform-api
    environment:
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      DATABASE_URL: postgresql+psycopg://platform:platform@postgres:5432/platform
      DETECTION_SERVICE_URL: http://detection-service:8003
      AUTH_TOKEN_SECRET: change-me-in-production
      INVITE_PUBLIC_BASE_URL: http://localhost:3000
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      detection-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U platform -d platform
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  detection-service:
    build:
      context: ./services/detection-service
    ports:
      - "127.0.0.1:8003:8003"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  judge-service:
    profiles: ["judge"]
    build:
      context: ./services/judge-service
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  platform-postgres-data:
